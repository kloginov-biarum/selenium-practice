<!DOCTYPE html>

<html>
<head>
    <meta charset="utf-8">
    <title>File input form</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.1/css/bootstrap.min.css"
          integrity="sha384-WskhaSGFgHYWDcbwN70/dfYBj47jz9qbsMId/iRN3ewGhXQFZCSftd1LZCfmhktB" crossorigin="anonymous">
    <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"
            integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo"
            crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.3/umd/popper.min.js"
            integrity="sha384-ZMP7rVo3mIykV+2+9J3UJ46jBk0WLaUAdn689aCwoqbBJiSnjAK/l8WvCWPIPm49"
            crossorigin="anonymous"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.1.1/js/bootstrap.min.js"
            integrity="sha384-smHYKdLADwkXOn1EmN1qk/HfnUcbVRZyYmZ4qpPea6sjB/pTJ0euyQp0Mk8ck+5T"
            crossorigin="anonymous"></script>
    <script>
        var isFinished = false;

        function countDown(interval) {
            var countDownTime = new Date();
            countDownTime = new Date(countDownTime.getTime() + 1000 * interval);

            var x = setInterval(function () {
                var now = new Date().getTime();
                var distance = countDownTime - now;
                var seconds = Math.floor((distance % (1000 * 60)) / 1000);

                document.getElementById("countdown").innerHTML = seconds + " seconds";

                if (distance < 0) {
                    clearInterval(x);
                    document.getElementById("countdown").innerHTML = " time is up :(";
                    document.getElementById("timeLeft").innerHTML = "Oops, ";
                    window.isFinished = true;
                    document.querySelector("button[type=submit]").disabled = true;
                }
            }, 100);
        }

        function showResult(task) {
            var warnings = ["Time is up!", "You are tenacious! Please, fill out the form using a script, not hands!"];
            var randomWarning = warnings[Math.floor(Math.random() * warnings.length)];
            if (!window.isFinished) {
                alert("Congrats, you've passed the task!");
            } else {
                alert(randomWarning);
            }
        }
    </script>
</head>

<body class="bg-light">

<h3 class="timer" style="padding-top: 50px; padding-left: 20px; background: #edeef0;">
    <span class="nowrap" id="timeLeft">Time left:</span>
    <span class="nowrap" id="countdown"></span>
</h3>

<div class="container" style="padding-top: 90px;">
    <h2>Hello! Please fill out the form with information about yourself: </h2>

    <form action="#" method="get" onsubmit="showResult(2208)" style="margin-top: 40px;">
        <div class="form-group">
            <label>First name* </label>
            <input type="text" name="firstname" class="form-control" placeholder="Enter first name" required maxlength="32">

            <label>Last name*</label>
            <input type="text" name="lastname" class="form-control" placeholder="Enter last name" required maxlength="32">

            <label>Email * </label>
            <input type="text" name="email" class="form-control" placeholder="Enter email" maxlength="32" required>
        </div>
        <label>Attach your short bio below</label>
        <br>
        <label for="file">Choose file to upload:</label>

        <input type="file" id="file" name="file" accept=".txt" required>
        <br>
        <button type="submit" class="btn btn-primary" style="margin-top: 40px;">Submit</button>
    </form>
</div>

<script>
    var isFinished = false;
    countDown(3);
</script>

</body>
</html>
