<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Child Frame</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.1/css/bootstrap.min.css"
          integrity="sha384-WskhaSGFgHYWDcbwN70/dfYBj47jz9qbsMId/iRN3ewGhXQFZCSftd1LZCfmhktB" crossorigin="anonymous">
    <style>
        body { background: #fef9e7; padding: 20px; }
    </style>
</head>
<body>
    <p id="child-text">Child Iframe</p>
    <p>This is the inner (child) frame. To reach this element you need to:</p>
    <ol>
        <li>Switch to <strong>parentFrame</strong></li>
        <li>Switch to <strong>childFrame</strong> inside it</li>
        <li>Read the text from <code>#child-text</code></li>
    </ol>
    <button id="child-btn" class="btn btn-warning"
            onclick="document.getElementById('child-result').style.display='block'">
        Click inside child frame
    </button>
    <div id="child-result" class="alert alert-success mt-2" style="display:none">
        Child frame button clicked!
    </div>
</body>
</html>
