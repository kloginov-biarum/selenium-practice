<html>
<head>
  <title>Robot searchs treasure</title>
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.1/css/bootstrap.min.css"
        integrity="sha384-WskhaSGFgHYWDcbwN70/dfYBj47jz9qbsMId/iRN3ewGhXQFZCSftd1LZCfmhktB" crossorigin="anonymous">
  <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"
          integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo"
          crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.3/umd/popper.min.js"
          integrity="sha384-ZMP7rVo3mIykV+2+9J3UJ46jBk0WLaUAdn689aCwoqbBJiSnjAK/l8WvCWPIPm49"
          crossorigin="anonymous"></script>
  <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.1.1/js/bootstrap.min.js"
          integrity="sha384-smHYKdLADwkXOn1EmN1qk/HfnUcbVRZyYmZ4qpPea6sjB/pTJ0euyQp0Mk8ck+5T"
          crossorigin="anonymous"></script>
  <style>
    html { position: relative; }
    body { min-height: 100%; margin-bottom: 60px; }
    .nowrap { white-space: nowrap; }
    .timer { padding-top: 50px; padding-left: 20px; background: #edeef0; }
    .check-input { padding-top: 30px; margin: 10px 0px 0px 0px; }
  </style>
  <script>
    var isFinished = false;

    function countDown(interval) {
      var countDownTime = new Date();
      countDownTime = new Date(countDownTime.getTime() + 1000 * interval);

      var x = setInterval(function () {
        var now = new Date().getTime();
        var distance = countDownTime - now;
        var seconds = Math.floor((distance % (1000 * 60)) / 1000);

        document.getElementById("countdown").innerHTML = seconds + " seconds";

        if (distance < 0) {
          clearInterval(x);
          document.getElementById("countdown").innerHTML = " time is up :(";
          document.getElementById("timeLeft").innerHTML = "Oops, ";
          window.isFinished = true;
          document.querySelector("button[type=submit]").disabled = true;
        }
      }, 100);
    }

    function checkTask(input_value, task) {
      if (document.getElementById("robotsRule").checked) {
        checkAnswer(input_value, task);
      } else {
        alert("Robots should rule!");
      }
    }

    function checkAnswer(input_value, task_number) {
      if (!window.isFinished) {
        var result = parseFloat(document.getElementById("answer").value);
        if (Math.abs(result - Math.log(Math.abs(12 * Math.sin(input_value)))) <= 1e-11) {
          alert("Congrats, you've passed the task!");
        } else {
          alert("Wrong answer!");
        }
      } else {
        alert("Time is up!");
      }
    }
  </script>
</head>

<body class="bg-light">
  <h3 class="timer">
      <span class="nowrap" id="timeLeft">Time left:</span>
      <span class="nowrap" id="countdown"></span>
  </h3>

  <div class="container" style="padding-top: 90px;">

    <form action="" method="get" onsubmit="checkTask(input_value, 2107);">
        <div class="form-group">
            <div>
                <div>
                    <h2>
                        <span class="nowrap"> What is ln(abs(12*sin(x))), where x is hidden in the </span>
                        <img src="images/chest.png" height="40" width="40" id="treasure" valuex="0">
                    </h2>
                </div>

                <input id="answer" type="text" required> <br>
                <div style="margin: 10px 0px 0px 0px;">
                    <input class="check-input" type="checkbox" id="robotCheckbox" required> I'm the robot <br>

                    <br>
                    <input class="check-input" type="radio" name="ruler" id="peopleRule" value="people" checked> People rule<br>
                    <input class="check-input" type="radio" name="ruler" id="robotsRule" value="robots"> Robots rule <br>
                </div>
                <br>
                <button type="submit" class="btn btn-default">Submit</button>
            </div>
        </div>

    </form>
  </div>
  <script>
    var input_value = Math.floor(Math.random() * 1000) + 1;
    var isFinished = false;
    document.getElementById("treasure").setAttribute("valuex", input_value);
    countDown(10);
  </script>
</body>
</html>
