<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Multi-select with Ctrl+Click</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.0/dist/css/bootstrap.min.css">
    <style>
        body { padding: 30px; }
        .grid { display: grid; grid-template-columns: repeat(4, 140px); gap: 12px; max-width: 620px; }
        .card-item {
            background: #fff;
            border: 2px solid #ced4da;
            border-radius: 6px;
            padding: 24px 12px;
            text-align: center;
            cursor: pointer;
            user-select: none;
            font-weight: 500;
        }
        .card-item.selected {
            background: #cfe2ff;
            border-color: #0d6efd;
            color: #084298;
        }
        #status { margin-top: 20px; font-size: 1.05em; }
    </style>
</head>
<body class="bg-light">

<div class="container">
    <h1>Multi-select — Ctrl+Click</h1>
    <p>Click a card to select it (clears previous selection).
       Hold <b>Ctrl</b> (or <b>Cmd</b> on Mac) and click to add cards to the selection.</p>

    <div class="grid" id="grid">
        <div class="card-item" data-id="a1">Alpha</div>
        <div class="card-item" data-id="b2">Bravo</div>
        <div class="card-item" data-id="c3">Charlie</div>
        <div class="card-item" data-id="d4">Delta</div>
        <div class="card-item" data-id="e5">Echo</div>
        <div class="card-item" data-id="f6">Foxtrot</div>
        <div class="card-item" data-id="g7">Golf</div>
        <div class="card-item" data-id="h8">Hotel</div>
    </div>

    <div id="status">Selected: <span id="selected-list">none</span></div>
</div>

<script>
    var cards = document.querySelectorAll('.card-item');
    cards.forEach(function (c) {
        c.addEventListener('click', function (e) {
            if (!e.ctrlKey && !e.metaKey) {
                cards.forEach(function (x) { x.classList.remove('selected'); });
            }
            c.classList.toggle('selected');
            updateStatus();
        });
    });

    function updateStatus() {
        var selected = Array.from(cards)
            .filter(function (c) { return c.classList.contains('selected'); })
            .map(function (c) { return c.textContent; });
        document.getElementById('selected-list').textContent = selected.length
            ? selected.join(', ')
            : 'none';
    }
</script>
</body>
</html>
