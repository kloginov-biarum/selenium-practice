<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"
           integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo"
           crossorigin="anonymous"></script>
    <meta charset="UTF-8">
    <title>Redirect page</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.1/css/bootstrap.min.css"
          integrity="sha384-WskhaSGFgHYWDcbwN70/dfYBj47jz9qbsMId/iRN3ewGhXQFZCSftd1LZCfmhktB" crossorigin="anonymous">
    <style>
        .nowrap { white-space: nowrap; }
        .timer { padding-top: 50px; padding-left: 20px; background: #edeef0; }
    </style>
    <script>
        var isFinished = false;

        function countDown(interval) {
            var countDownTime = new Date();
            countDownTime = new Date(countDownTime.getTime() + 1000 * interval);

            var x = setInterval(function () {
                var now = new Date().getTime();
                var distance = countDownTime - now;
                var seconds = Math.floor((distance % (1000 * 60)) / 1000);

                document.getElementById("countdown").innerHTML = seconds + " seconds";

                if (distance < 0) {
                    clearInterval(x);
                    document.getElementById("countdown").innerHTML = " time is up :(";
                    document.getElementById("timeLeft").innerHTML = "Oops, ";
                    window.isFinished = true;
                    document.querySelector("button[type=submit]").disabled = true;
                }
            }, 100);
        }

        function checkAnswer(input_value, task_number) {
            if (!window.isFinished) {
                var result = parseFloat(document.getElementById("answer").value);
                if (Math.abs(result - Math.log(Math.abs(12 * Math.sin(input_value)))) <= 1e-11) {
                    alert("Congrats, you've passed the task!");
                } else {
                    alert("Wrong answer!");
                }
            } else {
                alert("Time is up!");
            }
        }
    </script>
</head>

<body class="bg-light">
<form action="" method="get" onsubmit="checkAnswer(input_value, 2306)">
    <div class="form-group" style="margin: 90px 50px 50px 90px;">
        <div class="container">

            <h3 class="timer">
                <span class="nowrap" id="timeLeft">Time left:</span>
                <span class="nowrap" id="countdown"></span>
            </h3>
            <h3 style="padding: 20px">
                <span id="simple_text"> Math is real magic! </span>
            </h3>
            <div class="form-group">
                <label>
                    <span class="nowrap"> What is ln(abs(12*sin(x))), where x =  </span>
                    <span class="nowrap" id="input_value">  10 </span><span>?</span>
                </label>
                <input class="form-control" name="text" id="answer" type="text" required>
            </div>

            <button type="submit" class="btn btn-primary">Submit</button>
        </div>
    </div>
</form>
</body>

<script>
    var input_value = Math.floor(Math.random() * 1000) + 1;
    document.getElementById("input_value").innerHTML = input_value;
    var isFinished = false;
    countDown(5);
</script>
</html>
