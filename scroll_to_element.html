<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Scroll to Element</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.0/dist/css/bootstrap.min.css">
    <style>
        body { padding: 30px; }
        .filler { height: 700px; background: linear-gradient(180deg, #f8f9fa, #e9ecef); border-radius: 8px; margin: 20px 0; display: flex; align-items: center; justify-content: center; color: #adb5bd; font-size: 1.2em; }
        #hidden-btn { display: block; margin-top: 30px; }
        #status { margin-top: 16px; }
        .ok { color: #198754; font-weight: bold; }
        .header-fixed {
            position: sticky; top: 0;
            background: #0d6efd; color: #fff;
            padding: 10px 14px; border-radius: 4px;
            margin-bottom: 14px; z-index: 10;
        }
    </style>
</head>
<body class="bg-light">

<div class="container">
    <div class="header-fixed">Sticky header — stays visible while you scroll</div>
    <h1>Scroll to Element</h1>
    <p>Scroll all the way down to find the <b>"Click me"</b> button. It cannot be clicked until it is fully visible in the viewport.</p>

    <div class="filler">[ filler section 1 ]</div>
    <div class="filler">[ filler section 2 ]</div>
    <div class="filler">[ filler section 3 ]</div>
    <div class="filler">[ filler section 4 ]</div>

    <button id="hidden-btn" class="btn btn-primary">Click me</button>
    <div id="status">Status: <span id="state">not clicked</span></div>
</div>

<script>
    var btn = document.getElementById('hidden-btn');
    var state = document.getElementById('state');

    btn.addEventListener('click', function () {
        var rect = btn.getBoundingClientRect();
        var fullyVisible = rect.top >= 0 && rect.bottom <= window.innerHeight;
        if (!fullyVisible) {
            state.textContent = 'must be fully visible to click';
            state.className = '';
        } else {
            state.textContent = 'clicked successfully';
            state.className = 'ok';
        }
    });
</script>
</body>
</html>
