<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sortable List</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.0/dist/css/bootstrap.min.css">
    <style>
        body { padding: 30px; }
        .sort-list { list-style: none; padding: 0; max-width: 360px; }
        .sort-item {
            background: #fff;
            border: 1px solid #ced4da;
            border-radius: 4px;
            padding: 12px 16px;
            margin-bottom: 8px;
            cursor: grab;
            user-select: none;
        }
        .sort-item.dragging { opacity: 0.4; }
        .sort-item.drop-target { border-color: #0d6efd; border-style: dashed; }
        #status { margin-top: 16px; font-size: 1.05em; }
        .ok  { color: #198754; font-weight: bold; }
        .bad { color: #dc3545; }
    </style>
</head>
<body class="bg-light">

<div class="container">
    <h1>Sortable List</h1>
    <p>Drag the items to sort them <b>alphabetically (A → Z)</b>.</p>

    <ul class="sort-list" id="list">
        <li class="sort-item" draggable="true" data-id="cherry">Cherry</li>
        <li class="sort-item" draggable="true" data-id="apple">Apple</li>
        <li class="sort-item" draggable="true" data-id="elderberry">Elderberry</li>
        <li class="sort-item" draggable="true" data-id="banana">Banana</li>
        <li class="sort-item" draggable="true" data-id="date">Date</li>
    </ul>

    <button id="check" class="btn btn-primary">Check order</button>
    <div id="status">Status: <span id="state">unchecked</span></div>
</div>

<script>
    var list = document.getElementById('list');
    var dragged = null;

    list.addEventListener('dragstart', function (e) {
        if (!e.target.classList.contains('sort-item')) return;
        dragged = e.target;
        e.target.classList.add('dragging');
    });

    list.addEventListener('dragend', function (e) {
        if (dragged) dragged.classList.remove('dragging');
        list.querySelectorAll('.drop-target').forEach(function (el) { el.classList.remove('drop-target'); });
        dragged = null;
    });

    list.addEventListener('dragover', function (e) {
        e.preventDefault();
        var target = e.target.closest('.sort-item');
        if (!target || target === dragged) return;
        list.querySelectorAll('.drop-target').forEach(function (el) { el.classList.remove('drop-target'); });
        target.classList.add('drop-target');
    });

    list.addEventListener('drop', function (e) {
        e.preventDefault();
        var target = e.target.closest('.sort-item');
        if (!target || !dragged || target === dragged) return;
        var rect = target.getBoundingClientRect();
        var insertAfter = (e.clientY - rect.top) > rect.height / 2;
        if (insertAfter) target.after(dragged);
        else target.before(dragged);
    });

    document.getElementById('check').addEventListener('click', function () {
        var order = Array.from(list.querySelectorAll('.sort-item')).map(function (li) { return li.dataset.id; });
        var sorted = order.slice().sort();
        var state = document.getElementById('state');
        if (JSON.stringify(order) === JSON.stringify(sorted)) {
            state.textContent = 'sorted correctly';
            state.className = 'ok';
        } else {
            state.textContent = 'order is wrong: ' + order.join(', ');
            state.className = 'bad';
        }
    });
</script>
</body>
</html>
