<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Star Rating</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.0/dist/css/bootstrap.min.css">
    <style>
        body { padding: 30px; }
        .stars { display: inline-block; font-size: 2.5em; cursor: pointer; user-select: none; }
        .star { color: #ced4da; padding: 0 4px; transition: color 0.1s; }
        .star.hover, .star.selected { color: #ffc107; }
        #status { margin-top: 16px; font-size: 1.1em; }
        .ok { color: #198754; font-weight: bold; }
    </style>
</head>
<body class="bg-light">

<div class="container">
    <h1>Star Rating</h1>
    <p>Hover over the stars to highlight them. Click to set a rating.</p>

    <div class="stars" id="stars">
        <span class="star" data-value="1">★</span>
        <span class="star" data-value="2">★</span>
        <span class="star" data-value="3">★</span>
        <span class="star" data-value="4">★</span>
        <span class="star" data-value="5">★</span>
    </div>

    <div id="status">Selected rating: <span id="value">0</span> / 5</div>
</div>

<script>
    var stars   = document.querySelectorAll('.star');
    var current = 0;

    function paint(level, cls) {
        stars.forEach(function (s, i) {
            s.classList.toggle(cls, i < level);
        });
    }

    stars.forEach(function (s) {
        s.addEventListener('mouseover', function () {
            paint(parseInt(s.dataset.value), 'hover');
        });
        s.addEventListener('mouseout', function () {
            stars.forEach(function (x) { x.classList.remove('hover'); });
        });
        s.addEventListener('click', function () {
            current = parseInt(s.dataset.value);
            paint(current, 'selected');
            document.getElementById('value').textContent = current;
        });
    });
</script>
</body>
</html>
